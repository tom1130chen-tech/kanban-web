name: Auto-Upload Newsletters to Vercel Blob

on:
  push:
    branches: [main]
    paths:
      - 'data/newsletter*.json'

jobs:
  upload-to-blob:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Vercel CLI
        run: npm install -g vercel
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./kanban-board
      
      - name: Upload newsletters to Blob
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd kanban-board
          vercel link --scope bottomchens-projects --project kanban-ops --yes
          node scripts/auto-upload-blob.js
        continue-on-error: true
      
      - name: Report status
        uses: actions/github-script@v7
        with:
          script: |
            const success = ${{ job.status }} === 'success';
            console.log(`Upload ${success ? 'succeeded' : 'completed with errors'}`);
